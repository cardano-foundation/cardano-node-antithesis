name: Compose smoke test

# The publish-images workflow chains a `smoke-test` job
# after `publish-images` so the smoke-test result rolls up
# to the PR check suite. This standalone workflow is the
# manual escape hatch for re-running the same script
# against an arbitrary ref via `workflow_dispatch`, without
# rebuilding the images.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Run cardano_node_master smoke test
        run: ./scripts/smoke-test.sh cardano_node_master 600
      - name: Run cardano_amaru smoke test
        run: ./scripts/smoke-test.sh cardano_amaru 600
