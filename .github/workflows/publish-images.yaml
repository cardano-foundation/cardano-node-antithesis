name: "Build and push component images for cardano-node testnet"
env:
  REGISTRY: ghcr.io/cardano-foundation/cardano-node-antithesis
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-images:
    runs-on: ubuntu-latest

    # required permissions to be able to push to registry
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    steps:
    - name: 🚧 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 📥 Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.inputs.ref_name || '' }}
    - uses: paolino/dev-assets/setup-nix@v0.0.1
      with:
        cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
    - name: 🔑 Login Docker Registry
      uses: docker/login-action@v3
      with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
    - name: Collect images to publish
      id: images
      run: |
        scripts/push-cardano_node_master_images.sh
        scripts/push-asteria_game_images.sh

  smoke-test:
    name: Compose smoke test
    runs-on: ubuntu-latest
    needs: publish-images
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref_name || '' }}
      - name: Run smoke test
        run: ./scripts/smoke-test.sh cardano_node_master 600

  smoke-test-asteria-game:
    name: Compose smoke test (asteria_game)
    runs-on: ubuntu-latest
    needs: publish-images
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref_name || '' }}
      - name: Run smoke test
        run: ./scripts/smoke-test.sh asteria_game 600
