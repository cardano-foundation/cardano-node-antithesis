name: "Build and push component images for cardano-node testnet"
env:
  REGISTRY: ghcr.io/cardano-foundation/cardano-node-antithesis
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-images:
    runs-on: ubuntu-latest

    # required permissions to be able to push to registry
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    steps:
    - name: 🚧 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 📥 Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.event.inputs.ref_name || github.sha }}
        fetch-depth: 0
    - uses: paolino/dev-assets/setup-nix@v0.0.1
      with:
        cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
    - name: 🔑 Login Docker Registry
      uses: docker/login-action@v3
      with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
    - name: Collect images to publish
      id: images
      env:
        IMAGE_ARTIFACT_DIR: image-artifacts
      run: |
        scripts/push-cardano_node_master_images.sh
    - name: Upload image artifacts
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: component-images
        path: image-artifacts
        if-no-files-found: ignore
        retention-days: 7

  smoke-test:
    name: Compose smoke test
    runs-on: ubuntu-latest
    needs: publish-images
    timeout-minutes: 25
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.inputs.ref_name || github.sha }}
      - name: Run cardano_node_master smoke test
        run: ./scripts/smoke-test.sh cardano_node_master 600
      - name: Run cardano_amaru smoke test
        run: ./scripts/smoke-test.sh cardano_amaru 600
