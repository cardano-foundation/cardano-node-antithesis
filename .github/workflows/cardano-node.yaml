name: "Antithesis on cardano-node testnet"
env:
  TESTNET: ${{ inputs.test || 'cardano_node_master' }}
  REGISTRY: ghcr.io/cardano-foundation/cardano-node-antithesis
  EMAILS: 'antithesis@cardanofoundation.org'
  DURATION: ${{ inputs.duration || 3 }}
on:
  # can be dispatched manually
  workflow_dispatch:
     inputs:
       test:
        description: 'Test configuration to run (a directory in testnets)'
        required: true
        default: cardano_node_master
        type: string
       duration:
        description: 'Test duration (in hours)'
        required: false
        default: 3
        type: number
       no-faults:
        description: 'Run the test without injecting faults'
        required: false
        default: false
        type: boolean
  schedule:
    # run every 6 hours
    - cron:  '5 1,7,13,19 * * *'

jobs:
  run-cardano-node:
    runs-on: ubuntu-latest
    env:
      MOOG_GITHUB_PAT: ${{ secrets.MOOG_GITHUB_PAT }}
      MOOG_WALLET_FILE: wallet.json
      MOOG_MPFS_HOST: ${{ vars.MOOG_MPFS_HOST }}
      MOOG_TOKEN_ID: ${{ vars.MOOG_TOKEN_ID }}
      MOOG_PLATFORM: github
      MOOG_REQUESTER: cfhal

    timeout-minutes: 600

    # required permissions to be able to push to registry
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write


    steps:
    - name: 🚧 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 📥 Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.inputs.ref_name || '' }}

    - name: 🔑 Login Docker Registry
      uses: docker/login-action@v3
      with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

    - id: moog
      name: Get latest moog release tag
      uses: pozetroninc/github-action-get-latest-release@master
      with:
        repository: cardano-foundation/moog
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download moog from latest release
      uses: robinraju/release-downloader@v1.10
      with:
        repository: cardano-foundation/moog
        tag: ${{ steps.moog.outputs.release }}
        fileName: "moog-*-linux64.tar.gz"
        out-file-path: "."
        extract: true

    - name: Install moog
      run: |
        echo "Release: ${{ steps.moog.outputs.release }}"
        sudo install -m 0755 moog /usr/local/bin/moog
        moog --version

    - name: Configure moog wallet
      run: printf '%s' "${{ secrets.MOOG_REQUESTER_WALLET }}" | base64 --decode > $MOOG_WALLET_FILE

    - name: Submit test
      id: request
      run: |
        set -euo pipefail
        TRY=$(moog facts test-runs --whose cfhal | jq 'map(select(.key.commitId == "${{ github.sha }}")) | length')
        TRY=$(($TRY + 1)) # start with try=1
        echo "TRY=$TRY"
        if [ "${{ inputs.no-faults }}" = "true" ]; then
          render_no_faults="--no-faults"
        else
          render_no_faults=""
        fi

        # Render compose env placeholders before handing the test
        # directory to `moog requester create-test -d`. moog packages the
        # directory verbatim; it does not run docker compose, so any
        # ${VAR:-default} placeholder in docker-compose.yaml would ship
        # to Antithesis as a literal `:dev` tag and never resolve to the
        # HEAD-built image. The HEAD short SHA matches the tag that
        # publish-images.yaml pushed for ALWAYS_BUILD_COMPONENTS on this
        # commit.
        HEAD_TAG=$(git rev-parse --short=7 HEAD)
        REQUEST_DIR=$(mktemp -d)
        cp -a "testnets/$TESTNET/." "$REQUEST_DIR/"
        REQUEST_COMPOSE="$REQUEST_DIR/docker-compose.yaml"
        if [ -f "$REQUEST_COMPOSE" ]; then
          sed -i \
            -e "s|\${SIDECAR_TAG:-dev}|$HEAD_TAG|g" \
            -e "s|\${AMARU_PROBER_TAG:-dev}|$HEAD_TAG|g" \
            "$REQUEST_COMPOSE"
          if grep -nE '\$\{SIDECAR_TAG|\$\{AMARU_PROBER_TAG' "$REQUEST_COMPOSE"; then
            echo "FAIL: unresolved image-tag placeholder in $REQUEST_COMPOSE" >&2
            exit 1
          fi
        fi

        RESULT=$(moog requester create-test -d "$REQUEST_DIR" \
          -c ${{ github.sha }} \
          -r "$GITHUB_REPOSITORY" \
          --try $TRY \
          -t $DURATION \
          $render_no_faults)
        echo $RESULT

        # Passing -e and -r in separate jq calls ensures we both unwrap
        # the string quotes and fail if the json isn't as expected.
        ID=$(echo $RESULT | jq -e .value.testRunId | jq -r .)
        TXID=$(echo $RESULT | jq -e .txHash | jq -r .)
        echo "id=$ID" >> "$GITHUB_OUTPUT"
        echo "txHash=$TXID" >> "$GITHUB_OUTPUT"

    - name: Wait for results
      run: timeout $((($DURATION + 1) * 3600)) ./scripts/wait-for-test.sh "${{ steps.request.outputs.id }}"
