x-cardano-node: &cardano-node
  image: ghcr.io/intersectmbo/cardano-node:10.5.3
  environment:
    CARDANO_BLOCK_PRODUCER: true
  command: >
    run --topology /configs/configs/topology.json
      --config /configs/configs/config.json
      --database-path /state
      --socket-path /state/node.socket
      --tracer-socket-path-connect /tracer/tracer.socket
      --shelley-operational-certificate /configs/keys/opcert.cert
      --shelley-kes-key /configs/keys/kes.skey
      --shelley-vrf-key /configs/keys/vrf.skey
      --port 3001
      --host-addr 0.0.0.0
      +RTS -N -A16m -qg -qb -RTS
  restart: always
  depends_on:
    configurator:
      condition: service_completed_successfully
    tracer-sidecar:
      condition: service_started

x-cardano-relay: &cardano-relay
  environment:
    CARDANO_BLOCK_PRODUCER: false
  command: >
    run --topology /configs/configs/topology.json
      --config /configs/configs/config.json
      --database-path /state
      --socket-path /state/node.socket
      --tracer-socket-path-connect /tracer/tracer.socket
      --port 3001
      --host-addr 0.0.0.0
      +RTS -N -A16m -qg -qb -RTS
  restart: always
  depends_on:
    configurator:
      condition: service_completed_successfully
    tracer-sidecar:
      condition: service_started

services:
  configurator:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/configurator:aa43ea4
    container_name: configurator
    volumes:
      - ./testnet.yaml:/testnet.yaml #  source of configurations
      - p1-configs:/configs/1 # configs for p1
      - p2-configs:/configs/2 # configs for p2
      - p3-configs:/configs/3 # configs for p3

  tracer:
    image: ghcr.io/intersectmbo/cardano-tracer:10.6.0

    hostname: tracer.example
    container_name: tracer
    volumes:
      - tracer:/opt/cardano-tracer
      - ./tracer-config.yaml:/tracer-config.yaml:ro
    entrypoint: cardano-tracer
    command:
      - "--config"
      - "/tracer-config.yaml"
    restart: always

  p1:
    <<: *cardano-node
    container_name: p1
    hostname: p1.example
    volumes:
      - p1-configs:/configs:ro
      - tracer:/tracer

  p2:
    <<: *cardano-node
    image: ghcr.io/intersectmbo/cardano-node:10.6.2
    container_name: p2
    hostname: p2.example
    volumes:
      - p2-configs:/configs:ro
      - tracer:/tracer

  p3:
    <<: *cardano-node
    image: ghcr.io/intersectmbo/cardano-node:10.7.1
    container_name: p3
    hostname: p3.example
    volumes:
      - p3-configs:/configs:ro
      - tracer:/tracer

  relay1:
    <<: *cardano-relay
    image: ghcr.io/intersectmbo/cardano-node:10.6.2
    container_name: relay1
    hostname: relay1.example
    volumes:
      - p1-configs:/configs:ro
      - ./relay-topology.json:/configs/configs/topology.json:ro
      - tracer:/tracer

  relay2:
    <<: *cardano-relay
    image: ghcr.io/intersectmbo/cardano-node:10.7.1
    container_name: relay2
    hostname: relay2.example
    volumes:
      - p1-configs:/configs:ro
      - ./relay-topology.json:/configs/configs/topology.json:ro
      - tracer:/tracer

  oura:
    image: ghcr.io/txpipe/oura:latest
    container_name: oura
    hostname: oura.example
    command: daemon --config /etc/oura/daemon.toml
    volumes:
      - ./oura-daemon.toml:/etc/oura/daemon.toml:ro
    restart: always
    depends_on:
      relay1:
        condition: service_started

  sidecar:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/sidecar:452fae1
    environment:
      NETWORKMAGIC: 42
      PORT: 3001
      LIMIT: 100
      POOLS: "3"
      NCONNS: 1
      CHAINPOINT_FILEPATH: "/opt/cardano-tracer/chainPoints.log"
    container_name: sidecar
    hostname: sidecar.example
    volumes:
      - tracer:/opt/cardano-tracer # to read chain points
    depends_on:
      tracer-sidecar:
        condition: service_started
    restart: always
    tmpfs:
      - /tmp

  tracer-sidecar:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/tracer-sidecar:4da4d4e
    container_name: tracer-sidecar
    hostname: tracer-sidecar.example
    command:
      - "/opt/cardano-tracer/logs"
    environment:
      POOLS: "3"
      CHAINPOINT_FILEPATH: "/opt/cardano-tracer/chainPoints.log"
    volumes:
      - tracer:/opt/cardano-tracer
    restart: always
    depends_on:
      tracer:
        condition: service_started

volumes:
  tracer:
  p1-configs:
  p2-configs:
  p3-configs:

networks:
  default:
    name: cardano-node-testnet
    driver: bridge
    internal: ${INTERNAL_NETWORK}
