x-cardano-node: &cardano-node
  image: ghcr.io/intersectmbo/cardano-node@sha256:5ae211f92eac18ed27b9e2f73c190b56bf4c1a7145d282e78ca58597a385d19f
  environment:
    CARDANO_BLOCK_PRODUCER: true
  command: >
    run --topology /configs/configs/topology.json
      --config /configs/configs/config.json
      --database-path /state
      --socket-path /state/node.socket
      --tracer-socket-path-connect /tracer/tracer.socket
      --shelley-operational-certificate /configs/keys/opcert.cert
      --shelley-kes-key /configs/keys/kes.skey
      --shelley-vrf-key /configs/keys/vrf.skey
      --port 3001
      --host-addr 0.0.0.0
      +RTS -N -A16m -qg -qb -RTS
  restart: always
  depends_on:
    configurator:
      condition: service_completed_successfully
    tracer-sidecar:
      condition: service_started

x-cardano-relay: &cardano-relay
  environment:
    CARDANO_BLOCK_PRODUCER: false
  command: >
    run --topology /configs/configs/topology.json
      --config /configs/configs/config.json
      --database-path /state
      --socket-path /state/node.socket
      --tracer-socket-path-connect /tracer/tracer.socket
      --port 3001
      --host-addr 0.0.0.0
      +RTS -N -A16m -qg -qb -RTS
  restart: always
  depends_on:
    configurator:
      condition: service_completed_successfully
    tracer-sidecar:
      condition: service_started

services:
  configurator:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/configurator@sha256:6e6ba428838bf754ad286b62a151c63c683ef27fbdd5dd1bb5bab11ec9a6a34d
    container_name: configurator
    volumes:
      - ./testnet.yaml:/testnet.yaml #  source of configurations
      - p1-configs:/configs/1 # configs for p1
      - p2-configs:/configs/2 # configs for p2
      - p3-configs:/configs/3 # configs for p3
      - utxo-keys:/utxo-keys # funded address keys for tx-generator

  tracer:
    image: ghcr.io/intersectmbo/cardano-tracer@sha256:da628263a851b419c38d020d3a7dc3b65b20ee84e730faeb74babd6d96f28efe

    hostname: tracer.example
    container_name: tracer
    volumes:
      - tracer:/opt/cardano-tracer
      - ./tracer-config.yaml:/tracer-config.yaml:ro
    entrypoint: cardano-tracer
    command:
      - "--config"
      - "/tracer-config.yaml"
    restart: always

  p1:
    <<: *cardano-node
    container_name: p1
    hostname: p1.example
    volumes:
      - p1-configs:/configs:ro
      - tracer:/tracer

  p2:
    <<: *cardano-node
    image: ghcr.io/intersectmbo/cardano-node@sha256:c3cbc5aa0b758ba211567791539a67001e661fbe7a09275e37449e8b1252c4b2
    container_name: p2
    hostname: p2.example
    volumes:
      - p2-configs:/configs:ro
      - tracer:/tracer

  p3:
    <<: *cardano-node
    image: ghcr.io/intersectmbo/cardano-node@sha256:45857be8d86b314a05cd46d310b74b24e5f5870469f90c6464994a7f78142271
    container_name: p3
    hostname: p3.example
    volumes:
      - p3-configs:/configs:ro
      - tracer:/tracer

  relay1:
    <<: *cardano-relay
    image: ghcr.io/intersectmbo/cardano-node@sha256:c3cbc5aa0b758ba211567791539a67001e661fbe7a09275e37449e8b1252c4b2
    container_name: relay1
    hostname: relay1.example
    volumes:
      - p1-configs:/configs:ro
      - ./relay-topology.json:/configs/configs/topology.json:ro
      - relay1-state:/state
      - tracer:/tracer

  relay2:
    <<: *cardano-relay
    image: ghcr.io/intersectmbo/cardano-node@sha256:45857be8d86b314a05cd46d310b74b24e5f5870469f90c6464994a7f78142271
    container_name: relay2
    hostname: relay2.example
    volumes:
      - p1-configs:/configs:ro
      - ./relay-topology.json:/configs/configs/topology.json:ro
      - relay2-state:/state
      - tracer:/tracer

  # tx-generator service is parked in tx-generator.disabled.yaml.
  # It used to drive ADA transfers via N2C against relay1 and was
  # removed from this compose so the main testnet runs without a
  # synthetic transaction load. Restore from the parked file when
  # reintroducing the daemon.
  # tx-generator:
  #   # Tag is bumped commit-by-commit while the downstream
  #   # branch is in flight; the publish-images workflow
  #   # resolves <tag> to a commit on this repo and
  #   # rebuilds via `nix build .#docker-image`. Locally,
  #   # `nix build` from components/tx-generator/ produces
  #   # the exact tag and `docker load` makes compose pick
  #   # it up without a pull.
  #   image: ghcr.io/cardano-foundation/cardano-node-antithesis/tx-generator:2012360
  #   container_name: tx-generator
  #   hostname: tx-generator.example
  #   command:
  #     - --relay-socket
  #     - /state/node.socket
  #     - --control-socket
  #     - /state/tx-generator-control.sock
  #     - --state-dir
  #     - /state/txgen
  #     - --master-seed-file
  #     - /state/txgen/master.seed
  #     - --faucet-skey-file
  #     - /utxo-keys/genesis.1.skey
  #     - --network-magic
  #     - "42"
  #   volumes:
  #     # rw — daemon writes its control socket + state dir
  #     # under /state.
  #     - relay1-state:/state
  #     - utxo-keys:/utxo-keys:ro
  #   restart: always
  #   depends_on:
  #     relay1:
  #       condition: service_started
  #     configurator:
  #       condition: service_completed_successfully

  sidecar:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/sidecar:f889dbc
    environment:
      NETWORKMAGIC: 42
      PORT: 3001
      POOLS: "3"
    container_name: sidecar
    hostname: sidecar.example
    depends_on:
      tracer-sidecar:
        condition: service_started
    restart: always
    tmpfs:
      - /tmp

  tracer-sidecar:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/tracer-sidecar@sha256:8474b148f447dc202ffb19511b136ef4bcb84be1e3aa668c2a96f01ce0b5c689
    container_name: tracer-sidecar
    hostname: tracer-sidecar.example
    command:
      - "/opt/cardano-tracer/logs"
    environment:
      POOLS: "3"
      CHAINPOINT_FILEPATH: "/opt/cardano-tracer/chainPoints.log"
    volumes:
      - tracer:/opt/cardano-tracer
    restart: always
    depends_on:
      tracer:
        condition: service_started

  log-tailer:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/log-tailer@sha256:a5d23c42408a1003bb14208fd97dd2bdda102e7002e4e2a2804e71a80df56484
    container_name: log-tailer
    hostname: log-tailer.example
    volumes:
      - tracer:/tracer:ro
    restart: always
    depends_on:
      tracer:
        condition: service_started

  # Stub workload host. Long-lived utxo-indexer follows relay1's
  # chain via N2C, exposes ready/utxos_at/await on /tmp/idx.sock
  # (the listen socket inside this container). Composer scripts at
  # /opt/antithesis/test/v1/stub/ query that socket to drive
  # heartbeat / eventually / finally assertions.
  #
  # Built from upstream PR #98 (035-indexer-n2c-reconnect) — supervisor
  # with exponential-backoff reconnect handles N2C peer close in-process,
  # so the daemon stays up across relay restarts. RocksDB persistence
  # at /idx-db keeps state across full process restarts too.
  asteria-stub:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/asteria-stub@sha256:de04225e6d4395ff2126735e28664fa7ad2c9c9cd38e7bf856046a47e8e20973
    container_name: asteria-stub
    hostname: asteria-stub.example
    environment:
      INDEXER_SOCK: /tmp/idx.sock
    volumes:
      - relay1-state:/state:ro
      - asteria-stub-db:/idx-db
    tmpfs:
      - /tmp
    depends_on:
      relay1:
        condition: service_started

volumes:
  tracer:
  p1-configs:
  p2-configs:
  p3-configs:
  relay1-state:
  relay2-state:
  utxo-keys:
  asteria-stub-db:

networks:
  default:
    name: cardano-node-testnet
    driver: bridge
    internal: ${INTERNAL_NETWORK}
