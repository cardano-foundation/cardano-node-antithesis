x-cardano-node: &cardano-node
  image: ghcr.io/intersectmbo/cardano-node:10.5.3
  environment:
    CARDANO_BLOCK_PRODUCER: true
  command: >
    run --topology /configs/configs/topology.json
      --config /configs/configs/config.json
      --database-path /state
      --socket-path /state/node.socket
      --tracer-socket-path-connect /tracer/tracer.socket
      --shelley-operational-certificate /configs/keys/opcert.cert
      --shelley-kes-key /configs/keys/kes.skey
      --shelley-vrf-key /configs/keys/vrf.skey
      --port 3001
      --host-addr 0.0.0.0
      +RTS -N -A16m -qg -qb -RTS
  restart: always
  depends_on:
    configurator:
      condition: service_completed_successfully
    tracer-sidecar:
      condition: service_started

x-cardano-relay: &cardano-relay
  environment:
    CARDANO_BLOCK_PRODUCER: false
  command: >
    run --topology /configs/configs/topology.json
      --config /configs/configs/config.json
      --database-path /state
      --socket-path /state/node.socket
      --tracer-socket-path-connect /tracer/tracer.socket
      --port 3001
      --host-addr 0.0.0.0
      +RTS -N -A16m -qg -qb -RTS
  restart: always
  depends_on:
    configurator:
      condition: service_completed_successfully
    tracer-sidecar:
      condition: service_started

services:
  configurator:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/configurator:tx-gen-v1
    container_name: configurator
    volumes:
      - ./testnet.yaml:/testnet.yaml #  source of configurations
      - p1-configs:/configs/1 # configs for p1
      - p2-configs:/configs/2 # configs for p2
      - p3-configs:/configs/3 # configs for p3
      - utxo-keys:/utxo-keys # funded address keys for tx-generator

  tracer:
    image: ghcr.io/intersectmbo/cardano-tracer:10.6.0

    hostname: tracer.example
    container_name: tracer
    volumes:
      - tracer:/opt/cardano-tracer
      - ./tracer-config.yaml:/tracer-config.yaml:ro
    entrypoint: cardano-tracer
    command:
      - "--config"
      - "/tracer-config.yaml"
    restart: always

  p1:
    <<: *cardano-node
    container_name: p1
    hostname: p1.example
    volumes:
      - p1-configs:/configs:ro
      - tracer:/tracer

  p2:
    <<: *cardano-node
    image: ghcr.io/intersectmbo/cardano-node:10.6.2
    container_name: p2
    hostname: p2.example
    volumes:
      - p2-configs:/configs:ro
      - tracer:/tracer

  p3:
    <<: *cardano-node
    image: ghcr.io/intersectmbo/cardano-node:10.7.1
    container_name: p3
    hostname: p3.example
    volumes:
      - p3-configs:/configs:ro
      - tracer:/tracer

  relay1:
    <<: *cardano-relay
    image: ghcr.io/intersectmbo/cardano-node:10.6.2
    container_name: relay1
    hostname: relay1.example
    volumes:
      - p1-configs:/configs:ro
      - ./relay-topology.json:/configs/configs/topology.json:ro
      - relay1-state:/state
      - tracer:/tracer

  relay2:
    <<: *cardano-relay
    image: ghcr.io/intersectmbo/cardano-node:10.7.1
    container_name: relay2
    hostname: relay2.example
    volumes:
      - p1-configs:/configs:ro
      - ./relay-topology.json:/configs/configs/topology.json:ro
      - relay2-state:/state
      - tracer:/tracer

  oura:
    image: ghcr.io/txpipe/oura:latest
    container_name: oura
    hostname: oura.example
    command: daemon --config /etc/oura/daemon.toml
    volumes:
      - ./oura-daemon.toml:/etc/oura/daemon.toml:ro
    restart: always
    depends_on:
      relay1:
        condition: service_started

  tx-generator:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/tx-generator:tx-gen-v1
    container_name: tx-generator
    hostname: tx-generator.example
    environment:
      CARDANO_NODE_SOCKET_PATH: /state/node.socket
      NETWORK_MAGIC: "42"
    volumes:
      - relay1-state:/state:ro
      - p1-configs:/configs:ro
      - utxo-keys:/utxo-keys:ro
    restart: always
    depends_on:
      relay1:
        condition: service_started

  sidecar:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/sidecar:1362c5b
    environment:
      NETWORKMAGIC: 42
      PORT: 3001
      LIMIT: 100
      POOLS: "3"
      NCONNS: 1
      CHAINPOINT_FILEPATH: "/opt/cardano-tracer/chainPoints.log"
    container_name: sidecar
    hostname: sidecar.example
    volumes:
      - tracer:/opt/cardano-tracer # to read chain points
    depends_on:
      tracer-sidecar:
        condition: service_started
    restart: always
    tmpfs:
      - /tmp

  tracer-sidecar:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/tracer-sidecar:ff408d6
    container_name: tracer-sidecar
    hostname: tracer-sidecar.example
    command:
      - "/opt/cardano-tracer/logs"
    environment:
      POOLS: "3"
      CHAINPOINT_FILEPATH: "/opt/cardano-tracer/chainPoints.log"
    volumes:
      - tracer:/opt/cardano-tracer
    restart: always
    depends_on:
      tracer:
        condition: service_started

  log-tailer:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/log-tailer:a7d1d7d
    container_name: log-tailer
    hostname: log-tailer.example
    volumes:
      - tracer:/tracer:ro
    restart: always
    depends_on:
      tracer:
        condition: service_started

  # ----------------------------------------------
  # Asteria game (issue #56). Bootstrap is a
  # one-shot service that deploys validators +
  # creates the asteria UTxO + spawns pellets.
  # Players are long-running services that loop
  # the game decisions, with their RNG sourced
  # from Antithesis instrumentation so the
  # hypervisor can drive game state-space
  # exploration. Iteration 1 wires the pipeline
  # only — bootstrap and player binaries are
  # placeholders that emit sdk_reachable.
  # ----------------------------------------------

  asteria-bootstrap:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/asteria-player:dev
    container_name: asteria-bootstrap
    hostname: asteria-bootstrap.example
    # Override the image's `sleep-forever` entrypoint so the
    # composer driver actually runs and the container exits 0
    # once the bootstrap is complete.
    entrypoint: ["/bin/parallel_driver_asteria_bootstrap"]
    environment:
      CARDANO_NODE_SOCKET_PATH: /state/node.socket
      NETWORK_MAGIC: "42"
      ANTITHESIS_OUTPUT_DIR: /sdk
    volumes:
      - relay1-state:/state:ro
      - utxo-keys:/utxo-keys:ro
      - asteria-sdk:/sdk
    depends_on:
      relay1:
        condition: service_started

  asteria-player-1:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/asteria-player:dev
    container_name: asteria-player-1
    hostname: asteria-player-1.example
    entrypoint: ["/bin/parallel_driver_asteria_player"]
    environment:
      ASTERIA_PLAYER_ID: "1"
      CARDANO_NODE_SOCKET_PATH: /state/node.socket
      NETWORK_MAGIC: "42"
      ANTITHESIS_OUTPUT_DIR: /sdk
    volumes:
      - relay1-state:/state:ro
      - asteria-sdk:/sdk
    restart: always
    depends_on:
      asteria-bootstrap:
        condition: service_completed_successfully

  asteria-player-2:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/asteria-player:dev
    container_name: asteria-player-2
    hostname: asteria-player-2.example
    entrypoint: ["/bin/parallel_driver_asteria_player"]
    environment:
      ASTERIA_PLAYER_ID: "2"
      CARDANO_NODE_SOCKET_PATH: /state/node.socket
      NETWORK_MAGIC: "42"
      ANTITHESIS_OUTPUT_DIR: /sdk
    volumes:
      - relay2-state:/state:ro
      - asteria-sdk:/sdk
    restart: always
    depends_on:
      asteria-bootstrap:
        condition: service_completed_successfully

volumes:
  tracer:
  p1-configs:
  p2-configs:
  p3-configs:
  relay1-state:
  relay2-state:
  utxo-keys:
  asteria-sdk:

networks:
  default:
    name: cardano-node-testnet
    driver: bridge
    internal: ${INTERNAL_NETWORK}
