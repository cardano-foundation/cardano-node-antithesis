# cardano_node_governance — Conway governance workload under fault
# injection.
#
# Topology:
#   p1, p2   block producers (cardano-node 11.0.1), UNDER fault injection
#   relay1   relay, EXCLUDED from faults (stable query/submit endpoint)
#   gov-cli  sleeping cardano-cli container; Antithesis docker-execs the
#            governance composer drivers (create-action / vote) against
#            relay1, each cardano-cli operation a separate driver
#
# Genesis + governance assets (committee seeded in the Conway genesis,
# DRep / vote-stake / CC keys + certs) are produced by gov-configurator
# using cardonnay's conway_fast generator. The on-chain governance
# operations are performed by the gov-cli drivers in a setup phase
# (first_) plus parallel create/vote drivers.

x-cardano-node: &cardano-node
  image: ghcr.io/intersectmbo/cardano-node@sha256:007da778998d0bdb043fb834c62b9da1c95e33610f31f6f9cccab29a945e2b99
  environment:
    CARDANO_BLOCK_PRODUCER: true
  command: >
    run --topology /configs/configs/topology.json
      --config /configs/configs/config.json
      --database-path /state
      --socket-path /state/node.socket
      --tracer-socket-path-connect /tracer/tracer.socket
      --shelley-operational-certificate /configs/keys/opcert.cert
      --shelley-kes-key /configs/keys/kes.skey
      --shelley-vrf-key /configs/keys/vrf.skey
      --port 3001
      --host-addr 0.0.0.0
      +RTS -N -A16m -qg -qb -RTS
  restart: always
  depends_on:
    gov-configurator:
      condition: service_completed_successfully
    tracer-sidecar:
      condition: service_started

services:
  # One-shot: cardonnay genesis + governance assets -> volumes.
  gov-configurator:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/gov-configurator@sha256:6ee2397605939494bd1ec0de23156d1e254eaddbc29524f81f18d97a9ffb8d36
    container_name: gov-configurator
    environment:
      NUM_POOLS: "2"
      NUM_DREPS: "5"
      NUM_CC: "5"
      NETWORK_MAGIC: "42"
      PROTOCOL_VERSION: "10"
    volumes:
      - p1-configs:/configs/1
      - p2-configs:/configs/2
      - gov-data:/gov-data
      - gov-state:/gov-state

  tracer:
    image: ghcr.io/intersectmbo/cardano-tracer@sha256:da628263a851b419c38d020d3a7dc3b65b20ee84e730faeb74babd6d96f28efe
    hostname: tracer.example
    container_name: tracer
    labels:
      com.antithesis.exclude_from_faults: "network,kill,pause,stop"
    volumes:
      - tracer:/opt/cardano-tracer
      - ./tracer-config.yaml:/tracer-config.yaml:ro
    entrypoint: cardano-tracer
    command:
      - "--config"
      - "/tracer-config.yaml"
    restart: always

  p1:
    <<: *cardano-node
    container_name: p1
    hostname: p1.example
    volumes:
      - p1-configs:/configs:ro
      - tracer:/tracer

  p2:
    <<: *cardano-node
    container_name: p2
    hostname: p2.example
    volumes:
      - p2-configs:/configs:ro
      - tracer:/tracer

  relay1:
    image: ghcr.io/intersectmbo/cardano-node@sha256:007da778998d0bdb043fb834c62b9da1c95e33610f31f6f9cccab29a945e2b99
    container_name: relay1
    hostname: relay1.example
    labels:
      com.antithesis.exclude_from_faults: "network,kill,pause,stop"
    environment:
      CARDANO_BLOCK_PRODUCER: false
    command: >
      run --topology /configs/configs/topology.json
        --config /configs/configs/config.json
        --database-path /state
        --socket-path /state/node.socket
        --tracer-socket-path-connect /tracer/tracer.socket
        --port 3001
        --host-addr 0.0.0.0
        +RTS -N -A16m -qg -qb -RTS
    restart: always
    volumes:
      - p1-configs:/configs:ro
      - ./relay-topology.json:/configs/configs/topology.json:ro
      - relay1-state:/state
      - tracer:/tracer
    depends_on:
      gov-configurator:
        condition: service_completed_successfully
      tracer-sidecar:
        condition: service_started

  # Sleeping cardano-cli container holding the governance composer
  # drivers. Build with DRIVER_LANG=bash (default) or python.
  gov-cli:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/gov-cli@sha256:f4744e3c96736d34ca895feb6e6dc72cb0be55e2979198df29056e6bdc658598
    container_name: gov-cli
    hostname: gov-cli.example
    labels:
      com.antithesis.exclude_from_faults: "network,kill,pause,stop"
    environment:
      CARDANO_NODE_SOCKET_PATH: /state/node.socket
      TESTNET_MAGIC: "42"
      GOV: /gov-data
      GOV_STATE_DIR: /gov-state
      WORK: /work
      NUM_DREPS: "5"
      NUM_CC: "5"
      NUM_POOLS: "2"
    volumes:
      - relay1-state:/state:ro
      - gov-data:/gov-data
      - gov-state:/gov-state:ro
    tmpfs:
      - /work
    restart: always
    depends_on:
      relay1:
        condition: service_started
      gov-configurator:
        condition: service_completed_successfully

  sidecar:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/sidecar:1ff6913
    environment:
      NETWORKMAGIC: 42
      PORT: 3001
      POOLS: "2"
    container_name: sidecar
    hostname: sidecar.example
    labels:
      com.antithesis.exclude_from_faults: "network,kill,pause,stop"
    depends_on:
      tracer-sidecar:
        condition: service_started
    restart: always
    tmpfs:
      - /tmp

  tracer-sidecar:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/tracer-sidecar:5271661
    container_name: tracer-sidecar
    hostname: tracer-sidecar.example
    labels:
      com.antithesis.exclude_from_faults: "network,kill,pause,stop"
    command:
      - "/opt/cardano-tracer/logs"
    environment:
      POOLS: "2"
      CHAINPOINT_FILEPATH: "/opt/cardano-tracer/chainPoints.log"
    volumes:
      - tracer:/opt/cardano-tracer
    restart: always
    depends_on:
      tracer:
        condition: service_started

  log-tailer:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/log-tailer@sha256:a5d23c42408a1003bb14208fd97dd2bdda102e7002e4e2a2804e71a80df56484
    container_name: log-tailer
    hostname: log-tailer.example
    volumes:
      - tracer:/tracer:ro
    restart: always
    depends_on:
      tracer:
        condition: service_started

volumes:
  tracer:
  p1-configs:
  p2-configs:
  relay1-state:
  gov-data:
  gov-state:

networks:
  default:
    name: cardano-node-testnet
    driver: bridge
    internal: ${INTERNAL_NETWORK}
