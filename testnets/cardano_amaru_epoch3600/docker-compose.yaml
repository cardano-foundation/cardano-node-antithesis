x-cardano-node-10-7-1: &cardano-node-10-7-1
  image: ghcr.io/intersectmbo/cardano-node@sha256:3275d357053d21f3220f74b0854fd584e1fe322dfa1bbb78effd760c3191d14c
  environment:
    CARDANO_BLOCK_PRODUCER: true
  command: >
    run --topology /configs/configs/topology.json
      --config /configs/configs/config.json
      --database-path /state
      --socket-path /state/node.socket
      --tracer-socket-path-connect /tracer/tracer.socket
      --shelley-operational-certificate /configs/keys/opcert.cert
      --shelley-kes-key /configs/keys/kes.skey
      --shelley-vrf-key /configs/keys/vrf.skey
      --port 3001
      --host-addr 0.0.0.0
      +RTS -N -A16m -qg -qb -RTS
  restart: always
  depends_on:
    configurator:
      condition: service_completed_successfully
    tracer-sidecar:
      condition: service_started

x-cardano-relay-10-7-1: &cardano-relay-10-7-1
  image: ghcr.io/intersectmbo/cardano-node@sha256:3275d357053d21f3220f74b0854fd584e1fe322dfa1bbb78effd760c3191d14c
  environment:
    CARDANO_BLOCK_PRODUCER: false
  command: >
    run --topology /configs/configs/topology.json
      --config /configs/configs/config.json
      --database-path /state
      --socket-path /state/node.socket
      --tracer-socket-path-connect /tracer/tracer.socket
      --port 3001
      --host-addr 0.0.0.0
      +RTS -N -A16m -qg -qb -RTS
  restart: always
  depends_on:
    configurator:
      condition: service_completed_successfully
    tracer-sidecar:
      condition: service_started

x-amaru: &amaru
  # Amaru is relay-only in this testnet. It receives no stake pool keys,
  # no KES/VRF/opcert material, and no block-producing command.
  #
  # Each amaru-relay-N self-bootstraps from its paired cardano-node
  # producer pN inside its own entrypoint, then exec's /bin/amaru run.
  # Bootstrap happens during the test phase, not the Antithesis 6-min
  # setup window — see specs/080-amaru-self-bootstrap/.
  image: ghcr.io/lambdasistemi/amaru-bootstrap-producer:pr-32-ad64e76778b0408ec66f353c7e58c8a1e7d4045f
  entrypoint:
    - /bin/sh
    - -ec
  environment:
    # Antithesis log ingestion is intentionally narrow: keep Amaru below
    # warning/error quiet by default. Upstream Amaru uses AMARU_LOG rather
    # than RUST_LOG for its tracing EnvFilter.
    AMARU_LOG: warn
    AMARU_TRACE: warn
    AMARU_COLOR: never
    # Inherited from the previous standalone bootstrap-producer service:
    # /bin/bootstrap-producer reads these to size its catch-up loop.
    AMARU_NETWORK: testnet_42
    AMARU_CLUSTER_READY_DEADLINE_SECONDS: "30"
    AMARU_WAIT_DEADLINE_SECONDS: "30"
    AMARU_POLL_INTERVAL_SECONDS: "5"
    AMARU_BOOTSTRAP_RETRY_SECONDS: "5"
  restart: always

services:
  configurator:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/configurator@sha256:6e6ba428838bf754ad286b62a151c63c683ef27fbdd5dd1bb5bab11ec9a6a34d
    container_name: configurator
    volumes:
      - ./testnet.yaml:/testnet.yaml
      - p1-configs:/configs/1
      - p2-configs:/configs/2
      - p3-configs:/configs/3

  tracer:
    image: ghcr.io/intersectmbo/cardano-tracer@sha256:da628263a851b419c38d020d3a7dc3b65b20ee84e730faeb74babd6d96f28efe
    hostname: tracer.example
    container_name: tracer
    volumes:
      - tracer:/opt/cardano-tracer
      - ./tracer-config.yaml:/tracer-config.yaml:ro
    entrypoint: cardano-tracer
    command:
      - "--config"
      - "/tracer-config.yaml"
    restart: always

  p1:
    <<: *cardano-node-10-7-1
    container_name: p1
    hostname: p1.example
    volumes:
      - p1-configs:/configs:ro
      - p1-state:/state
      - tracer:/tracer

  p2:
    <<: *cardano-node-10-7-1
    container_name: p2
    hostname: p2.example
    volumes:
      - p2-configs:/configs:ro
      - p2-state:/state
      - tracer:/tracer

  p3:
    <<: *cardano-node-10-7-1
    container_name: p3
    hostname: p3.example
    volumes:
      - p3-configs:/configs:ro
      - p3-state:/state
      - tracer:/tracer

  relay1:
    <<: *cardano-relay-10-7-1
    container_name: relay1
    hostname: relay1.example
    volumes:
      - p1-configs:/configs:ro
      - ./relay-topology.json:/configs/configs/topology.json:ro
      - relay1-state:/state
      - tracer:/tracer

  relay2:
    <<: *cardano-relay-10-7-1
    container_name: relay2
    hostname: relay2.example
    volumes:
      - p1-configs:/configs:ro
      - ./relay-topology.json:/configs/configs/topology.json:ro
      - relay2-state:/state
      - tracer:/tracer

  amaru-relay-1:
    <<: *amaru
    container_name: amaru-relay-1
    hostname: amaru-relay-1.example
    depends_on:
      p1:
        condition: service_started
    command:
      - |
        relay="amaru-relay-1"
        peer="p1.example:3001"

        retry="$${AMARU_BOOTSTRAP_RETRY_SECONDS:-20}"
        final="/srv/amaru"
        work="$${final}/.work"
        scratch_state="$${work}/cardano-state"
        scratch_out="$${work}/out"
        attempt_log="$${work}/bootstrap-attempt.log"
        marker="/startup/$${relay}.started"
        sentinel="$${final}/.bootstrap-complete"

        bundle_complete() {
          test -f "$${sentinel}" \
            && test -d "$${final}/ledger.testnet_42.db/live" \
            && test -d "$${final}/chain.testnet_42.db" \
            && test -f "$${final}/nonces.json"
        }

        refresh_snapshot() {
          test -d /live/immutable || return 1
          test -d /live/ledger || return 1
          test -d /live/volatile || return 1
          test -f /live/protocolMagicId || return 1
          test -e /live/lock || return 1

          mkdir -p "$${work}"
          rm -rf "$${scratch_state}.tmp" "$${scratch_state}"
          mkdir -p "$${scratch_state}.tmp"
          if cp -a /live/immutable /live/ledger /live/volatile /live/protocolMagicId /live/lock "$${scratch_state}.tmp/" 2>"$${work}/snapshot-copy.err"; then
            mv "$${scratch_state}.tmp" "$${scratch_state}"
            rm -f "$${work}/snapshot-copy.err"
            return 0
          fi
          rm -rf "$${scratch_state}.tmp"
          return 1
        }

        promote() {
          stage="$${final}/.staged"
          rm -rf "$${stage}"
          mkdir -p "$${stage}"
          cp -rL "$${scratch_out}/testnet_42/." "$${stage}/" || return 1

          # Sweep any stale top-level entries (except our scratch dirs).
          find "$${final}" -mindepth 1 -maxdepth 1 \
            ! -path "$${work}" \
            ! -path "$${stage}" \
            ! -path "$${sentinel}" \
            -exec rm -rf {} +

          for entry in "$${stage}"/*; do
            mv "$${entry}" "$${final}/"
          done
          rmdir "$${stage}"
          : > "$${sentinel}"
          rm -rf "$${work}"
        }

        while :; do
          if bundle_complete; then
            break
          fi

          if refresh_snapshot; then
            mkdir -p "$${scratch_out}"
            rc=0
            /bin/bootstrap-producer "$${scratch_state}" /cardano/config/configs "$${scratch_out}" testnet_42 >"$${attempt_log}" 2>&1 || rc=$$?
            case "$${rc}" in
              0)
                if promote; then
                  echo "bootstrap-producer: committed $${final}"
                  continue
                fi
                # promote failed (rare; e.g. cp interrupted) — fall through and retry
                ;;
              1|2|5|7)
                # Transient under Antithesis faults or a snapshot copied before
                # enough immutable history was available. Refresh state and
                # try again so Antithesis does not record this as a container
                # failure.
                ;;
              *)
                tail -n 50 "$${attempt_log}" >&2 || true
                exit "$${rc}"
                ;;
            esac
          fi

          sleep "$${retry}"
        done

        mkdir -p /startup
        printf '%s\n' "$${HOSTNAME:-amaru-relay-1.example}" > "$${marker}"
        exec /bin/amaru run \
          --network testnet_42 \
          --ledger-dir /srv/amaru/ledger.testnet_42.db \
          --chain-dir /srv/amaru/chain.testnet_42.db \
          --era-history-file /amaru-runtime/era-history.json \
          --global-parameters-file /amaru-runtime/global-parameters.json \
          --peer-address "$${peer}"
    volumes:
      - p1-state:/live:ro
      - p1-configs:/cardano/config:ro
      - ./amaru-runtime:/amaru-runtime:ro
      - amaru-startup:/startup
      - a1-state:/srv/amaru

  amaru-relay-2:
    <<: *amaru
    container_name: amaru-relay-2
    hostname: amaru-relay-2.example
    depends_on:
      p2:
        condition: service_started
    command:
      - |
        relay="amaru-relay-2"
        peer="p2.example:3001"

        retry="$${AMARU_BOOTSTRAP_RETRY_SECONDS:-20}"
        final="/srv/amaru"
        work="$${final}/.work"
        scratch_state="$${work}/cardano-state"
        scratch_out="$${work}/out"
        attempt_log="$${work}/bootstrap-attempt.log"
        marker="/startup/$${relay}.started"
        sentinel="$${final}/.bootstrap-complete"

        bundle_complete() {
          test -f "$${sentinel}" \
            && test -d "$${final}/ledger.testnet_42.db/live" \
            && test -d "$${final}/chain.testnet_42.db" \
            && test -f "$${final}/nonces.json"
        }

        refresh_snapshot() {
          test -d /live/immutable || return 1
          test -d /live/ledger || return 1
          test -d /live/volatile || return 1
          test -f /live/protocolMagicId || return 1
          test -e /live/lock || return 1

          mkdir -p "$${work}"
          rm -rf "$${scratch_state}.tmp" "$${scratch_state}"
          mkdir -p "$${scratch_state}.tmp"
          if cp -a /live/immutable /live/ledger /live/volatile /live/protocolMagicId /live/lock "$${scratch_state}.tmp/" 2>"$${work}/snapshot-copy.err"; then
            mv "$${scratch_state}.tmp" "$${scratch_state}"
            rm -f "$${work}/snapshot-copy.err"
            return 0
          fi
          rm -rf "$${scratch_state}.tmp"
          return 1
        }

        promote() {
          stage="$${final}/.staged"
          rm -rf "$${stage}"
          mkdir -p "$${stage}"
          cp -rL "$${scratch_out}/testnet_42/." "$${stage}/" || return 1

          find "$${final}" -mindepth 1 -maxdepth 1 \
            ! -path "$${work}" \
            ! -path "$${stage}" \
            ! -path "$${sentinel}" \
            -exec rm -rf {} +

          for entry in "$${stage}"/*; do
            mv "$${entry}" "$${final}/"
          done
          rmdir "$${stage}"
          : > "$${sentinel}"
          rm -rf "$${work}"
        }

        while :; do
          if bundle_complete; then
            break
          fi

          if refresh_snapshot; then
            mkdir -p "$${scratch_out}"
            rc=0
            /bin/bootstrap-producer "$${scratch_state}" /cardano/config/configs "$${scratch_out}" testnet_42 >"$${attempt_log}" 2>&1 || rc=$$?
            case "$${rc}" in
              0)
                if promote; then
                  echo "bootstrap-producer: committed $${final}"
                  continue
                fi
                ;;
              1|2|5|7)
                ;;
              *)
                tail -n 50 "$${attempt_log}" >&2 || true
                exit "$${rc}"
                ;;
            esac
          fi

          sleep "$${retry}"
        done

        mkdir -p /startup
        printf '%s\n' "$${HOSTNAME:-amaru-relay-2.example}" > "$${marker}"
        exec /bin/amaru run \
          --network testnet_42 \
          --ledger-dir /srv/amaru/ledger.testnet_42.db \
          --chain-dir /srv/amaru/chain.testnet_42.db \
          --era-history-file /amaru-runtime/era-history.json \
          --global-parameters-file /amaru-runtime/global-parameters.json \
          --peer-address "$${peer}"
    volumes:
      - p2-state:/live:ro
      - p2-configs:/cardano/config:ro
      - ./amaru-runtime:/amaru-runtime:ro
      - amaru-startup:/startup
      - a2-state:/srv/amaru

  sidecar:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/sidecar:fb26cec
    environment:
      NETWORKMAGIC: 42
      PORT: 3001
      LIMIT: 100
      POOLS: "3"
      NCONNS: 1
      SLEEP_SETTLE: "30"
      MAX_ATTEMPTS: "15"
      RETRY_DELAY: "3"
      CHAINPOINT_FILEPATH: "/opt/cardano-tracer/chainPoints.log"
      AMARU_STARTUP_REQUIRED: "true"
      AMARU_STARTUP_DIR: "/amaru-startup"
      AMARU_RELAYS: "amaru-relay-1 amaru-relay-2"
    container_name: sidecar
    hostname: sidecar.example
    volumes:
      - tracer:/opt/cardano-tracer
      - amaru-startup:/amaru-startup:ro
    depends_on:
      tracer-sidecar:
        condition: service_started
    restart: always
    tmpfs:
      - /tmp

  tracer-sidecar:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/tracer-sidecar@sha256:8474b148f447dc202ffb19511b136ef4bcb84be1e3aa668c2a96f01ce0b5c689
    container_name: tracer-sidecar
    hostname: tracer-sidecar.example
    command:
      - "/opt/cardano-tracer/logs"
    environment:
      POOLS: "3"
      CHAINPOINT_FILEPATH: "/opt/cardano-tracer/chainPoints.log"
    volumes:
      - tracer:/opt/cardano-tracer
    restart: always
    depends_on:
      tracer:
        condition: service_started

  log-tailer:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/log-tailer@sha256:a5d23c42408a1003bb14208fd97dd2bdda102e7002e4e2a2804e71a80df56484
    container_name: log-tailer
    hostname: log-tailer.example
    volumes:
      - tracer:/tracer:ro
    restart: always
    depends_on:
      tracer:
        condition: service_started

volumes:
  tracer:
  p1-configs:
  p2-configs:
  p3-configs:
  p1-state:
  p2-state:
  p3-state:
  relay1-state:
  relay2-state:
  amaru-startup:
  a1-state:
  a2-state:

networks:
  default:
    name: cardano-amaru-epoch3600-testnet
    driver: bridge
    internal: ${INTERNAL_NETWORK}
